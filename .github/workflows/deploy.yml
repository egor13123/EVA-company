name: Deploy to Sprinthost

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-sprinthost
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SPRINTHOST_SSH_KEY }}
          SSH_HOST: ${{ secrets.SPRINTHOST_HOST }}
          SSH_PORT: ${{ secrets.SPRINTHOST_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        env:
          SSH_HOST: ${{ secrets.SPRINTHOST_HOST }}
          SSH_USER: ${{ secrets.SPRINTHOST_USER }}
          SSH_PORT: ${{ secrets.SPRINTHOST_PORT }}
          REMOTE_PATH: ${{ secrets.SPRINTHOST_PATH }}
        run: |
          case "$REMOTE_PATH" in
            ""|"/"|"/home"|"/home/"|"~"|"~/")
              echo "Refusing: SPRINTHOST_PATH ('$REMOTE_PATH') is too broad." >&2
              exit 1
              ;;
          esac
          rsync -avz --delete --human-readable \
            --exclude='.htaccess' \
            -e "ssh -p ${SSH_PORT:-22} -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            out/ "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH%/}/"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
